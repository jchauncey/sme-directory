name: typecheck

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Typecheck
        run: npm run typecheck
